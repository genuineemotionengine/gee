<html>
    <head>
        <title>Test</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <script>
        $(document).ready(function(){
        var duration = 336;
        var current = 307;
        var currentpos = (current/duration)*100;
        var currentprogress = currentpos.toFixed(0);
        alert(currentprogress);
        function(){
        $('#dynamic').css('width', currentprogress + '%');
        };

        });
        </script>
        
        
        
    </head>
    <body>
        <div id="dynamic"></div>
    </body>
