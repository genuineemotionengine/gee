<!DOCTYPE html>
<html>
<body>

<h2>The XMLHttpRequest Object</h2>
<button type="button" onclick="loadDoc()">Request data</button>
<p id="demo"></p>

<script>
function loadDoc() {
  const xhttp = new XMLHttpRequest();

  xhttp.open("GET", "http://192.168.68.118/api.php?service=4");
  xhttp.send();
}
</script>

</body>
</html>
